<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Mush</title>

    <link rel="stylesheet" href="https://use.typekit.net/afr3ldv.css">
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/styles.css" />
    <link rel="stylesheet" href="styles/contact.css" />
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollSmoother.min.js"></script>
  </head>

  <body>
    <div id="smooth-wrapper">
      <div id="smooth-content">
        <nav class="navbar">
          <ul>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="studio.html">Studio</a></li>
            <li class="logo">
              <a href="index.html">
                <img
                  src="images/logo-black.svg"
                  data-theme="images/logo-white.svg"
                  alt="mush creative"
                />
              </a>
            </li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li>
              <button id="theme-toggle" type="button">
                <img
                  src="images/theme.svg"
                  data-theme="images/theme-white.svg"
                  alt="theme"
                />
              </button>
            </li>
          </ul>
        </nav>

        <div class="container">
          <div class="grid">
            <div class="info">
              <div class="info-section">
                <div class="info-title">General Queries</div>
                <strong>hey@mushcreative.in</strong>
              </div>

              <div class="info-section">
                <div class="info-title">Contact</div>
                <strong>+91-98182-47179</strong>
              </div>

              <div class="info-section">
                <div class="info-title">Address</div>
                <strong>
                  Procapitus Business Park, D-247, 4A, D Block, Sector 63,
                  Noida, Uttar Pradesh 201301
                </strong>
              </div>

              <div class="info-section social-info">
                <div class="info-title">Let’s Be Friends</div>
                <div class="socials">
                  <span
                    ><a
                      href="https://www.instagram.com/mush.creative/"
                      target="_blank"
                      ><img
                        src="images/instagram.svg"
                        data-theme="images/instagram-white.svg"
                        alt="instagram" /></a
                  ></span>
                  <span
                    ><a
                      href="https://www.behance.net/mushcreative"
                      target="_blank"
                      ><img
                        src="images/behance.svg"
                        data-theme="images/behance-white.svg"
                        alt="behance" /></a
                  ></span>
                  <span
                    ><a
                      href="https://www.linkedin.com/company/mush-creative"
                      target="_blank"
                      ><img
                        src="images/linkedin.svg"
                        data-theme="images/linkedin-white.svg"
                        alt="linkedin" /></a
                  ></span>
                </div>
              </div>
            </div>

            <div class="form">
              <div class="title">
                <h1 class="animate">Let's start a conversation</h1>
              </div>

              <form id="contactForm">
                <div class="form-group animate">
                  <input type="text" id="name" placeholder="Your Name" />
                  <div class="error" id="nameError">Required</div>
                </div>

                <div class="form-group animate">
                  <input type="email" id="email" placeholder="Email" />
                  <div class="error" id="emailError">Invalid email</div>
                </div>

                <div class="form-group animate">
                  <input type="text" placeholder="Company Name (Optional)" />
                </div>

                <div class="form-group animate">
                  <textarea
                    id="message"
                    placeholder="Tell us about your project"
                    rows="5"
                  ></textarea>
                  <div class="error" id="messageError">Required</div>
                </div>

                <button
                  class="submit-btn"
                  type="submit"
                  data-effects-padding="200"
                >
                  Submit Message
                  <img
                    src="images/arrow-right-black.svg"
                    data-theme="images/arrow-right-white.svg"
                  />
                </button>
              </form>
            </div>
          </div>
        </div>
        <br />
      </div>
    </div>
    <script>
      document
        .getElementById("theme-toggle")
        .addEventListener("click", function () {
          document.body.classList.toggle("dark-theme");
          // Toggle image sources for theme
          const imgs = document.querySelectorAll("img[data-theme]");
          imgs.forEach((img) => {
            const temp = img.src;
            img.src = img.dataset.theme;
            img.dataset.theme = temp;
          });
        });

      gsap.registerPlugin(ScrollTrigger, ScrollSmoother);

      const smoother = ScrollSmoother.create({
        wrapper: "#smooth-wrapper",
        content: "#smooth-content",
        smooth: 2,
        normalizeScroll: true,
        ignoreMobileResize: true,
        preventDefault: true,
      });

      // ================= VALIDATION =================
      const form = document.getElementById("contactForm");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        let valid = true;

        const name = document.getElementById("name");
        const email = document.getElementById("email");
        const message = document.getElementById("message");

        const nameError = document.getElementById("nameError");
        const emailError = document.getElementById("emailError");
        const messageError = document.getElementById("messageError");

        // Reset
        document
          .querySelectorAll(".error")
          .forEach((el) => (el.style.opacity = 0));

        if (name.value.trim() === "") {
          nameError.style.opacity = 1;
          valid = false;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email.value)) {
          emailError.style.opacity = 1;
          valid = false;
        }

        if (message.value.trim() === "") {
          messageError.style.opacity = 1;
          valid = false;
        }

        if (valid) {
          alert("Form submitted successfully!");
          form.reset();
        }
      });

      // ================= GSAP ANIMATIONS =================
      gsap.from(".navbar", {
        y: -60,
        opacity: 0,
        duration: 1,
      });

      gsap.from(".info-section", {
        x: -40,
        opacity: 0,
        stagger: 0.2,
        duration: 1,
      });

      gsap.from(".animate", {
        y: 30,
        opacity: 0,
        stagger: 0.15,
        duration: 1,
        delay: 0.3,
      });

      // SUBMIT BUTTON
      gsap.from(".submit-btn", {
        scrollTrigger: {
          trigger: ".submit-btn",
          start: "top 90%",
        },
        scale: 0.8,
        opacity: 0,
        duration: 0.5,
        ease: "back.out(1.7)",
      });
    </script>
  </body>
</html>
